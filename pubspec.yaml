name: framesketch_player
description: "A professional video playback desktop tool with frame-accurate stepping and annotation overlay"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Video playback - libmpv backend for desktop
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_windows_video: ^1.0.9  # FFmpeg/libmpv binaries for Windows
  media_kit_libs_macos_video: ^1.0.4    # macOS support
  media_kit_libs_linux: ^1.0.2          # Linux support

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI utilities
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.4
  path: ^1.9.0

  # Data & serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  crypto: ^3.0.6
  shared_preferences: ^2.3.3

  # Utils
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
